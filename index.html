<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUMDes Campurejo Sukses Mandiri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding-bottom: 100px; }
        .bg-navy { background-color: #0f172a; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; z-index: 50; border-top: 2px solid #334155; }
        .nav-item { color: #94a3b8; text-align: center; transition: 0.3s; }
        .active-nav { color: #ffffff !important; }
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        input { border: 1.5px solid #cbd5e1; border-radius: 12px; padding: 16px; width: 100%; font-size: 16px; outline: none; }
        input:focus { border-color: #0f172a; }
        .tab-active { border-bottom: 3px solid #0f172a; color: #0f172a; font-weight: bold; }
        th { background: #f8fafc; padding: 12px; font-weight: 700; color: #64748b; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="bg-navy text-white p-6 rounded-b-[40px] shadow-2xl mb-6">
        <h1 class="text-sm font-bold opacity-70 mb-4 text-center tracking-widest">BUMDes Campurejo Sukses Mandiri</h1>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/10 p-4 rounded-2xl border border-white/5 text-center">
                <p class="text-[9px] uppercase opacity-60 mb-1">Total Saldo</p>
                <h2 id="dash-saldo" class="text-lg font-bold">Rp 0</h2>
            </div>
            <div class="bg-white/10 p-4 rounded-2xl border border-white/5 text-center">
                <p class="text-[9px] uppercase opacity-60 mb-1">Panen Hari Ini</p>
                <h2 id="dash-egg" class="text-lg font-bold text-yellow-400">0 Pcs</h2>
            </div>
        </div>
    </header>

    <main id="app-content" class="px-4"></main>

    <nav class="bottom-nav">
        <button onclick="showPage('kasir')" class="nav-item" id="nav-kasir"><i data-lucide="layout-grid"></i><div class="text-[10px] mt-1">Kasir</div></button>
        <button onclick="showPage('biaya')" class="nav-item" id="nav-biaya"><i data-lucide="plus-circle"></i><div class="text-[10px] mt-1">Input</div></button>
        <button onclick="showPage('riwayat')" class="nav-item" id="nav-riwayat"><i data-lucide="clock"></i><div class="text-[10px] mt-1">Riwayat</div></button>
        <button onclick="showPage('laporan')" class="nav-item" id="nav-laporan"><i data-lucide="file-bar-chart"></i><div class="text-[10px] mt-1">Laporan</div></button>
        <button onclick="showPage('setting')" class="nav-item" id="nav-setting"><i data-lucide="settings"></i><div class="text-[10px] mt-1">Setting</div></button>
    </nav>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAE6ZdvdUmPlamcyIWwzdt692D9us_Hs6ESHotAqyP-y71Unkl5J_51briGDfK3LV3/exec";
        let dbData = { transaksi: [], biaya: [], telur: [] };
        let editId = null;
        let activeTabBiaya = 'pengeluaran';

        async function init() { showPage('kasir'); await refreshData(); }

        async function refreshData() {
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getData' }) });
                dbData = await res.json();
                updateDashboard();
            } catch (e) { console.error(e); }
        }

        function updateDashboard() {
            const today = new Date().toISOString().split('T')[0];
            const tInc = dbData.transaksi.reduce((a,b)=>a+b[5], 0);
            const tExp = dbData.biaya.reduce((a,b)=>a+b[3], 0);
            const eToday = dbData.telur.filter(e => e[1].startsWith(today)).reduce((a,b)=>a+b[2], 0);
            document.getElementById('dash-saldo').innerText = `Rp ${(tInc - tExp).toLocaleString()}`;
            document.getElementById('dash-egg').innerText = `${eToday} Pcs/Kg`;
        }

        const pages = {
            kasir: `
                <div class="glass-card p-6 mb-4">
                    <h3 id="form-title" class="font-bold text-gray-800 mb-6 uppercase text-sm tracking-widest text-center border-b pb-4">Penjualan Telur</h3>
                    <div class="space-y-4">
                        <input type="text" id="k-admin" placeholder="Nama Petugas">
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="k-kg" placeholder="Berat (kg)" oninput="calcTotal()">
                            <input type="number" id="k-harga" placeholder="Harga (Rp)" oninput="calcTotal()">
                        </div>
                        <div class="p-6 bg-blue-50 rounded-2xl text-center border-2 border-dashed border-blue-100">
                            <h2 id="k-total-label" class="text-3xl font-black text-navy">Rp 0</h2>
                        </div>
                        <button onclick="simpanDanPrint()" id="btn-main" class="w-full bg-navy text-white py-5 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-lg active:scale-95 transition">
                            <i data-lucide="printer"></i> SIMPAN & CETAK STRUK
                        </button>
                    </div>
                </div>`,
            biaya: `
                <div class="flex mb-4 bg-white rounded-xl p-1 shadow-sm border border-gray-100">
                    <button onclick="setTabBiaya('pengeluaran')" id="tab-p" class="flex-1 py-3 text-xs tab-active">Pengeluaran</button>
                    <button onclick="setTabBiaya('telur')" id="tab-t" class="flex-1 py-3 text-xs text-gray-400">Hasil Telur</button>
                </div>
                <div id="biaya-form-container"></div>`,
            riwayat: `
                <div class="glass-card overflow-hidden">
                    <table class="w-full text-left">
                        <thead><tr><th>Admin/Tgl</th><th>Total</th><th class="text-center">Aksi</th></tr></thead>
                        <tbody id="table-riwayat-body" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>`,
            laporan: `
                <div class="glass-card p-6 text-center">
                    <input type="month" id="lap-bulan" class="mb-6 text-center" onchange="renderLaporan()">
                    <div id="lap-res" class="space-y-4"></div>
                </div>`,
            setting: `
                <div class="glass-card p-6 space-y-4 text-center">
                    <p class="text-xs text-gray-400 font-bold uppercase mb-2">Sistem Database</p>
                    <button onclick="refreshData()" class="w-full bg-gray-100 py-4 rounded-xl font-bold flex items-center justify-center gap-2"><i data-lucide="refresh-cw" size="18"></i> Sinkronkan Data</button>
                    <button onclick="resetData()" class="w-full bg-red-50 text-red-600 py-4 rounded-xl font-bold border border-red-100 flex items-center justify-center gap-2"><i data-lucide="trash-2" size="18"></i> Reset Seluruh Data</button>
                </div>`
        };

        function showPage(page) {
            editId = null;
            document.getElementById('app-content').innerHTML = pages[page];
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-nav'));
            document.getElementById(`nav-${page}`).classList.add('active-nav');
            lucide.createIcons();
            if(page === 'riwayat') renderRiwayat();
            if(page === 'biaya') setTabBiaya('pengeluaran');
            if(page === 'laporan') { document.getElementById('lap-bulan').value = new Date().toISOString().slice(0, 7); renderLaporan(); }
        }

                function setTabBiaya(tab) {
            activeTabBiaya = tab;
            const container = document.getElementById('biaya-form-container');
            
            // Atur gaya tombol tab
            document.getElementById('tab-p').className = tab === 'pengeluaran' ? 'flex-1 py-3 text-xs tab-active' : 'flex-1 py-3 text-xs text-gray-400';
            document.getElementById('tab-t').className = tab === 'telur' ? 'flex-1 py-3 text-xs tab-active' : 'flex-1 py-3 text-xs text-gray-400';
            
            if(tab === 'pengeluaran') {
                container.innerHTML = `
                    <div class="glass-card p-6 space-y-3 mb-4">
                        <input type="text" id="b-ket" placeholder="Keterangan (Pakan/Obat/Lainnya)">
                        <input type="number" id="b-nom" placeholder="Nominal (Rp)">
                        <button onclick="simpanBiaya()" class="w-full bg-red-600 text-white py-4 rounded-xl font-bold active:scale-95 transition">SIMPAN BIAYA</button>
                    </div>
                    <div class="text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-widest px-2">Riwayat Biaya Terakhir</div>
                    <div id="list-biaya-render" class="space-y-2"></div>`;
                renderBiayaList();
            } else {
                container.innerHTML = `
                    <div class="glass-card p-6 space-y-3 mb-4">
                        <input type="number" id="e-qty" placeholder="Jumlah Telur (Pcs/Kg)">
                        <button onclick="simpanTelur()" class="w-full bg-yellow-500 text-white py-4 rounded-xl font-bold active:scale-95 transition">SIMPAN HASIL PANEN</button>
                    </div>
                    <div class="text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-widest px-2">Riwayat Panen Terakhir</div>
                    <div id="list-telur-render" class="space-y-2"></div>`;
                renderTelurList();
            }
            lucide.createIcons();
        }

        // --- FUNGSI UNTUK MENAMPILKAN DAFTAR BIAYA ---
                function renderBiayaList() {
            // Pastikan ID di sini adalah 'list-biaya-render'
            const list = document.getElementById('list-biaya-render');
            if (!list) return;

            if (dbData.biaya.length === 0) {
                list.innerHTML = `<p class="text-center text-xs text-gray-400 py-10">Belum ada data pengeluaran</p>`;
                return;
            }

            // Ambil 10 data biaya terakhir
            list.innerHTML = dbData.biaya.slice().reverse().slice(0, 10).map(b => `
                <div class="bg-white p-4 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm mb-2">
                    <div>
                        <p class="text-xs font-bold text-gray-800">${b[2]}</p>
                        <p class="text-[9px] text-gray-400">${new Date(b[1]).toLocaleDateString('id-ID')}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <p class="text-red-600 font-bold text-sm">Rp ${b[3].toLocaleString()}</p>
                        <button onclick="hapusBiaya('${b[0]}')" class="text-gray-300 hover:text-red-500 transition">
                            <i data-lucide="trash-2" size="16"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            
            // Re-inisialisasi ikon lucide agar muncul
            lucide.createIcons();
        }


        // --- FUNGSI UNTUK MENAMPILKAN DAFTAR HASIL PANEN TELUR ---
        function renderTelurList() {
            const list = document.getElementById('list-telur-render');
            if (dbData.telur.length === 0) {
                list.innerHTML = `<p class="text-center text-xs text-gray-400 py-4">Belum ada data panen</p>`;
                return;
            }
            list.innerHTML = dbData.telur.slice().reverse().slice(0, 10).map(e => `
                <div class="bg-white p-4 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="text-xs font-bold text-gray-800">Panen Telur</p>
                        <p class="text-[9px] text-gray-400">${new Date(e[1]).toLocaleDateString('id-ID')}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <p class="text-yellow-600 font-black text-sm">${e[2]} Pcs/Kg</p>
                        <button onclick="hapusTelur('${e[0]}')" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" size="14"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Tambahkan juga fungsi hapus biaya dan telur jika belum ada
        async function hapusBiaya(id) {
            if(!confirm("Hapus data biaya ini?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'hapusBiaya', id }) });
            await refreshData();
            setTabBiaya('pengeluaran');
        }

        async function hapusTelur(id) {
            if(!confirm("Hapus data panen ini?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'hapusTelur', id }) });
            await refreshData();
            setTabBiaya('telur');
        }



        async function simpanDanPrint() {
            const kg = parseFloat(document.getElementById('k-kg').value);
            const hr = parseFloat(document.getElementById('k-harga').value);
            const adm = document.getElementById('k-admin').value;
            if(!adm || isNaN(kg)) return alert("Lengkapi data!");

            const data = { action: editId ? 'editTransaksi' : 'tambahTransaksi', id: editId, admin: adm, kg: kg, harga: hr, total: kg * hr };
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            
            const struk = `BUMDes Campurejo Sukses Mandiri\n------------------\nPetugas: ${adm}\nBerat: ${kg} kg\nHarga: Rp ${hr.toLocaleString()}\nTotal: Rp ${(kg*hr).toLocaleString()}\n------------------\nTerima Kasih`;
            window.location.href = "rawbt:base64," + btoa(struk);
            
            await refreshData();
            showPage('riwayat');
        }

        function renderRiwayat() {
            const container = document.getElementById('table-riwayat-body');
            if(dbData.transaksi.length === 0) {
                container.innerHTML = `<tr><td colspan="3" class="text-center py-10 text-gray-400">Belum ada transaksi</td></tr>`;
                return;
            }
            container.innerHTML = dbData.transaksi.slice().reverse().map(t => `
                <tr class="text-[11px]">
                    <td class="p-3"><strong>${t[2]}</strong><br><span class="text-gray-400 text-[9px]">${new Date(t[1]).toLocaleDateString()}</span></td>
                    <td class="p-3 font-bold text-navy">Rp ${t[5].toLocaleString()}</td>
                    <td class="p-3 text-center">
                        <div class="flex justify-center gap-2">
                            <button onclick="editTrx('${t[0]}')" class="p-2 bg-blue-50 text-blue-600 rounded-lg"><i data-lucide="edit-2" size="14"></i></button>
                            <button onclick="hapusTrx('${t[0]}')" class="p-2 bg-red-50 text-red-500 rounded-lg"><i data-lucide="trash" size="14"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function editTrx(id) {
            const t = dbData.transaksi.find(x => x[0] === id);
            showPage('kasir');
            editId = id;
            document.getElementById('k-admin').value = t[2];
            document.getElementById('k-kg').value = t[3];
            document.getElementById('k-harga').value = t[4];
            document.getElementById('form-title').innerText = "Update Transaksi";
            calcTotal();
            lucide.createIcons();
        }

        async function hapusTrx(id) {
            if(!confirm("Hapus transaksi?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'hapusTransaksi', id }) });
            await refreshData(); renderRiwayat();
        }

        async function simpanBiaya() {
            const data = { action: 'tambahBiaya', keterangan: document.getElementById('b-ket').value, nominal: parseFloat(document.getElementById('b-nom').value) };
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            await refreshData(); setTabBiaya('pengeluaran');
        }

        async function simpanTelur() {
            const qty = document.getElementById('e-qty').value;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'tambahTelur', jumlah: parseFloat(qty) }) });
            await refreshData(); showPage('riwayat');
        }

        function renderLaporan() {
            const bln = document.getElementById('lap-bulan').value;
            const trx = dbData.transaksi.filter(t => t[1].startsWith(bln));
            const exp = dbData.biaya.filter(b => b[1].startsWith(bln));
            const egg = dbData.telur.filter(e => e[1].startsWith(bln));

            const sTrx = trx.reduce((a,b)=>a+b[5], 0);
            const sExp = exp.reduce((a,b)=>a+b[3], 0);
            const sEgg = egg.reduce((a,b)=>a+b[2], 0);

            document.getElementById('lap-res').innerHTML = `
                <div class="grid grid-cols-2 gap-3">
                    <div class="p-4 bg-blue-50 rounded-2xl text-left"><p class="text-[9px] font-bold text-blue-400">PENJUALAN</p><p class="font-bold text-navy">Rp ${sTrx.toLocaleString()}</p></div>
                    <div class="p-4 bg-red-50 rounded-2xl text-left"><p class="text-[9px] font-bold text-red-400">BIAYA</p><p class="font-bold text-red-600">Rp ${sExp.toLocaleString()}</p></div>
                </div>
                <div class="p-5 bg-yellow-50 rounded-2xl text-left border border-yellow-100">
                    <p class="text-[9px] font-bold text-yellow-600 uppercase">Total Produksi Telur</p>
                    <p class="text-2xl font-black text-yellow-700">${sEgg.toLocaleString()} <span class="text-xs">Pcs/Kg</span></p>
                </div>
                <div class="p-6 bg-navy text-white rounded-3xl"><p class="text-[10px] font-bold opacity-60">LABA BERSIH</p><p class="text-2xl font-black">Rp ${(sTrx-sExp).toLocaleString()}</p></div>`;
        }

        async function resetData() {
            if(!confirm("Hapus seluruh data di database?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'resetData' }) });
            location.reload();
        }

        function calcTotal() {
            const kg = document.getElementById('k-kg').value || 0;
            const hr = document.getElementById('k-harga').value || 0;
            document.getElementById('k-total-label').innerText = `Rp ${(kg * hr).toLocaleString()}`;
        }

        function renderBiayaList() {
            const list = document.getElementById('list-biaya');
            list.innerHTML = dbData.biaya.slice().reverse().map(b => `
                <div class="bg-white p-3 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm">
                    <div class="text-[10px]"><strong>${b[2]}</strong><br>${new Date(b[1]).toLocaleDateString()}</div>
                    <div class="text-red-500 font-bold text-xs">Rp ${b[3].toLocaleString()}</div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
